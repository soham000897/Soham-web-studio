<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Sales Assistant</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Poppins}

body{
background:#0f172a;
color:#fff;
height:100vh;
display:flex;
flex-direction:column;
}

header{
padding:16px;
text-align:center;
background:#111827;
font-weight:600;
}

.chat{
flex:1;
overflow-y:auto;
padding:18px;
display:flex;
flex-direction:column;
gap:12px;
}

.msg{
max-width:80%;
padding:12px 16px;
border-radius:16px;
font-size:14px;
line-height:1.4;
animation:fade .2s ease;
}

@keyframes fade{
from{opacity:0;transform:translateY(6px)}
to{opacity:1}
}

.bot{
background:#1e293b;
align-self:flex-start;
}

.user{
background:linear-gradient(135deg,#2563eb,#4f46e5);
align-self:flex-end;
}

.typing{
display:flex;
gap:4px;
}

.typing span{
width:6px;
height:6px;
background:#94a3b8;
border-radius:50%;
animation:blink 1.2s infinite;
}

.typing span:nth-child(2){animation-delay:.2s}
.typing span:nth-child(3){animation-delay:.4s}

@keyframes blink{
0%{opacity:.2}
20%{opacity:1}
100%{opacity:.2}
}

.input-area{
display:flex;
padding:12px;
background:#111827;
}

input{
flex:1;
padding:10px 14px;
border:none;
border-radius:20px;
background:#1e293b;
color:#fff;
outline:none;
font-size:14px;
}

button{
margin-left:8px;
padding:10px 16px;
border:none;
border-radius:20px;
background:#2563eb;
color:#fff;
font-weight:600;
cursor:pointer;
}

button:active{transform:scale(.95)}

.cta-btn{
display:inline-block;
margin-top:8px;
padding:6px 12px;
background:#2563eb;
border-radius:8px;
font-size:12px;
text-decoration:none;
color:#fff;
}
</style>
</head>

<body>

<header>AI Sales Assistant</header>

<div class="chat" id="chat"></div>

<div class="input-area">
<input id="input" placeholder="Type here...">
<button onclick="send()">Send</button>
</div>

<script>
let stage=0;
let confuse=0;

const chat=document.getElementById("chat");
const input=document.getElementById("input");

addBot("Hi 👋 What type of website do you need?");

function send(){
let text=input.value.trim();
if(!text) return;

addUser(text);
input.value="";
showTyping();

setTimeout(()=>{
removeTyping();
reply(text.toLowerCase());
},600);
}

function addUser(text){
let div=document.createElement("div");
div.className="msg user";
div.innerText=text;
chat.appendChild(div);
scrollDown();
}

function addBot(text,cta=false){
let div=document.createElement("div");
div.className="msg bot";

if(cta){
div.innerHTML=text + "<br><a class='cta-btn' href='https://wa.me/919083946648' target='_blank'>Contact Now</a>";
}else{
div.innerText=text;
}

chat.appendChild(div);
scrollDown();
}

function showTyping(){
let div=document.createElement("div");
div.className="msg bot";
div.id="typing";
div.innerHTML="<div class='typing'><span></span><span></span><span></span></div>";
chat.appendChild(div);
scrollDown();
}

function removeTyping(){
let t=document.getElementById("typing");
if(t) t.remove();
}

function scrollDown(){
chat.scrollTop=chat.scrollHeight;
}

function reply(text){

// Direct pricing
if(text.includes("price")||text.includes("plan")){
return addBot("Starter ₹1999\nBusiness ₹3999\nPremium ₹6999+");
}

// Delivery
if(text.includes("delivery")||text.includes("time")){
return addBot("Delivery: 2–5 working days.");
}

// Contact
if(text.includes("contact")||text.includes("number")){
return addBot("📞 +91 9083946648\n📧 sohamwebstudio@gmail.com");
}

// Sales funnel short
if(stage===0){
stage=1;
return addBot("Budget range?");
}

if(stage===1){
stage=2;
return addBot("Delivery time needed?");
}

if(stage===2){
stage=3;
return addBot("Business Plan fits best.",true);
}

// Confuse control
confuse++;

if(confuse>=2){
confuse=0;
return addBot("Let's connect directly.\n📞 9083946648",true);
}

const shortReplies=[
"Can you clarify?",
"More details please.",
"What exactly do you need?"
];

addBot(shortReplies[Math.floor(Math.random()*shortReplies.length)]);
}
</script>

</body>
</html>
